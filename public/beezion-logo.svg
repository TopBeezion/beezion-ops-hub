<svg width="280" height="72" viewBox="0 0 280 72" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- "beezi" text -->
  <text x="0" y="56" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="900" fill="#111111" letter-spacing="-2">beezi</text>

  <!-- Hexagon "o" — centered at x=192, y=32 -->
  <g transform="translate(192, 8)">
    <polygon points="22,0 44,12 44,36 22,48 0,36 0,12" fill="#F5A623"/>
    <text x="22" y="34" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle">o</text>
  </g>

  <!-- "n" text -->
  <text x="238" y="56" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="900" fill="#111111" letter-spacing="-2">n</text>

  <!-- Bee above hexagon -->
  <g transform="translate(196, 2)">
    <!-- Body -->
    <ellipse cx="9" cy="5" rx="4" ry="3" fill="#F5A623" stroke="#111" stroke-width="0.8"/>
    <!-- Stripes -->
    <line x1="6" y1="4" x2="12" y2="4" stroke="#111" stroke-width="0.8"/>
    <line x1="5.5" y1="6" x2="12.5" y2="6" stroke="#111" stroke-width="0.8"/>
    <!-- Wings -->
    <ellipse cx="3" cy="3" rx="3.5" ry="2" fill="rgba(200,220,255,0.7)" stroke="#888" stroke-width="0.5"/>
    <ellipse cx="15" cy="3" rx="3.5" ry="2" fill="rgba(200,220,255,0.7)" stroke="#888" stroke-width="0.5"/>
    <!-- Antennae -->
    <line x1="7" y1="2" x2="4" y2="0" stroke="#111" stroke-width="0.7"/>
    <line x1="11" y1="2" x2="14" y2="0" stroke="#111" stroke-width="0.7"/>
    <circle cx="4" cy="0" r="0.8" fill="#111"/>
    <circle cx="14" cy="0" r="0.8" fill="#111"/>
  </g>
</svg>
